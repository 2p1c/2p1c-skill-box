name: Install Agent Skills

on:
  workflow_dispatch:        # 仅支持手动触发（本地安装后推送即可，无需 CI 重复安装）

jobs:
  install-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read config and install skills
        run: |
          CONFIG="skills.config.json"

          # 构建 agent 参数数组（修复：使用 bash 数组避免参数被当成单个字符串）
          AGENT_ARGS=()
          while IFS= read -r agent; do
            AGENT_ARGS+=("-a" "$agent")
          done < <(jq -r '.agents[]' "$CONFIG")

          echo "🤖 目标 agents: ${AGENT_ARGS[*]}"

          # 只安装 enabled: true 的 skills（修复：用进程替换避免 while 子 shell 问题）
          while IFS= read -r skill; do
            NAME=$(echo "$skill" | jq -r '.name')
            SOURCE=$(echo "$skill" | jq -r '.source')
            echo "📦 Installing skill: $NAME from $SOURCE"
            npx skills add "$SOURCE" --skill "$NAME" "${AGENT_ARGS[@]}" -y
          done < <(jq -c '.skills[] | select(.enabled == true)' "$CONFIG")

      - name: Commit installed skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .agents/ .claude/ .agent/ .github/
          git diff --staged --quiet || git commit -m "chore: update installed agent skills"
          git push